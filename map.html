<!DOCTYPE HTML>
<html>
<head>
    <title>Hike Map - HIXZ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { 
            height: 70vh; /* Map takes up 70% of screen height */
            width: 100%; 
            border-bottom: 2px solid #fff;
        }
        .map-container { padding: 2em; text-align: center; }
    </style>
</head>
<body class="is-preload">

    <header id="header">
        <h1><a href="index.html">HIXZ</a></h1>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <article id="main">
        <header>
            <h2>Aruba Hike Map</h2>
            <p>Live GPS Tracking & Trail Routes</p>
        </header>
        <section class="wrapper style5">
            <div class="inner">
                <div id="map"></div>
                <div class="map-container">
                    <button class="button primary" onclick="getLocation()">Find My Location</button>
                </div>
            </div>
        </section>
    </article>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    // 1. Initialize Map
    var map = L.map('map').setView([12.5211, -69.9683], 14);

    // 2. Add Free Tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3. LOAD YOUR GPX FILE
    // Replace 'your-file-name.gpx' with the EXACT name of the file you uploaded to GitHub
    var gpx = 'Conchi_Natuurbad_Wandelroute.gpx';

    new L.GPX(gpx, {
        async: true,
        polyline_options: {
            color: 'orange',
            weight: 5,
            opacity: 0.75,
            lineCap: 'round'
        }
    }).on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
    }).addTo(map);

    // 4. Function for GPS
   // 4. Function for GPS
    function getLocation() {
        map.locate({setView: true, maxZoom: 16});
    } // <--- The function ends here

    // 5. Add Photo Points (Markers) - This stays outside so it's always visible
    var conchiMarker = L.marker([12.5244, -69.9126]).addTo(map);

    conchiMarker.bindPopup(`
        <div style="text-align:center;">
            <h3 style="color:black; margin:0;">Natural Pool (Conchi)</h3>
            <p style="color:black; margin:10px 0;">The best spot for a DJI Action 5 swim video!</p>
            <img src="images/arikok.jpeg" alt="Conchi" style="width:100px; border-radius:5px;">
        </div>
    `);

    map.on('locationfound', function(e) {
        L.circle(e.latlng, {radius: 10, color: 'blue'}).addTo(map)
            .bindPopup("You are here!").openPopup();
    });
</script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
