<!DOCTYPE HTML>
<html>
<head>
    <title>Cunucu Arikok Loop - HIXZ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 70vh; width: 100%; border-bottom: 2px solid #fff; background: #2e3436; }
        .map-container { padding: 2em; text-align: center; }
        .leaflet-pane img, .leaflet-tile-container img { max-width: none !important; max-height: none !important; width: auto !important; padding: 0 !important; }
        .leaflet-popup-content-wrapper { color: #000 !important; border-radius: 8px; }
        .leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
        .popup-img { width: 100%; height: auto; border-radius: 5px; margin-top: 8px; display: block; }
    </style>
</head>
<body class="is-preload">
    <header id="header">
        <h1><a href="index.html">HIXZ</a></h1>
        <nav id="nav"><ul><li><a href="index.html">Back to Home</a></li></ul></nav>
    </header>
    <article id="main">
        <header>
            <h2>Cunucu Arikok Loop</h2>
            <p>Easy 2-hour Nature & Culture Walk</p>
        </header>
        <section class="wrapper style5">
            <div class="inner">
                <div id="map"></div>
                <div class="map-container"><button class="button primary" onclick="getLocation()">Find My Location</button></div>
            </div>
        </section>
    </article>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
<script>
    var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });
    var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenTopoMap' });

    // 1. Center map on the Visitor Center / First Aid area
    var map = L.map('map', { center: [12.4933, -69.9455], zoom: 16, layers: [satellite] });
    L.control.layers({"Satellite": satellite, "Terrain": terrain, "Streets": streets}).addTo(map);

    // 2. Load the new GPX file (Make sure to rename your actual file to this)
    var gpxFile = 'Cunucu_Arikok_Loop.gpx'; 
    
    new L.GPX(gpxFile, {
        async: true,
        marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, pointMatchers: [] },
        polyline_options: { color: '#2ecc71', weight: 6, opacity: 0.9 } // Green trail for a "nature" walk
    }).on('loaded', function(e) {
        var gpx = e.target;
        map.fitBounds(gpx.getBounds());

        var startCoords = gpx.get_start_point();
        var endCoords = gpx.get_end_point();

        // Start/End Marker (since it's a loop, these are usually the same spot)
        L.circleMarker(startCoords, { radius: 10, fillColor: "#2ecc71", color: "#fff", weight: 2, fillOpacity: 1 })
            .addTo(map).bindPopup("<b style='color:black;'>Visitor Center Trailhead</b><br><span style='color:black;'>Start your 2-hour loop here!</span>");

        // Add a marker for the historical "Cunucu" house if you have the coords
        L.circleMarker([12.4915, -69.9440], { radius: 7, fillColor: "#f1c40f", color: "#fff", weight: 2, fillOpacity: 1 })
            .addTo(map).bindPopup(`
                <div style="text-align:center; width:160px; color:black;">
                    <h3 style="margin:0;">Cunucu Arikok</h3>
                    <p style="font-size:12px;">Historical Aruban farmstead.</p>
                    <img src="images/arikok.jpeg" class="popup-img" onerror="this.style.display='none';">
                </div>
            `);
    }).addTo(map);

    var userMarker, userCircle;
    function getLocation() { map.locate({setView: true, maxZoom: 17}); }
    map.on('locationfound', function(e) {
        if (userMarker) { map.removeLayer(userMarker); }
        if (userCircle) { map.removeLayer(userCircle); }
        userCircle = L.circle(e.latlng, { radius: 15, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
        userMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
        userMarker.bindPopup("You are here!").openPopup();
    });
    setTimeout(function(){ map.invalidateSize()}, 500);
</script>
</body>
</html>
