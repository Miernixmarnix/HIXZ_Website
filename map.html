<!DOCTYPE HTML>
<html>
<head>
    <title>Hike Map - HIXZ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { 
            height: 70vh; 
            width: 100%; 
            border-bottom: 2px solid #fff;
        }
        .map-container { padding: 2em; text-align: center; }
        /* Fix for popup text colors in Spectral theme */
        .leaflet-popup-content-wrapper { color: #000 !important; }
        .leaflet-control-zoom { margin-top: 80px !important; }
    </style>
</head>
<body class="is-preload">

    <header id="header">
        <h1><a href="index.html">HIXZ</a></h1>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <article id="main">
        <header>
            <h2>Aruba Hike Map</h2>
            <p>Live GPS Tracking & Trail Routes</p>
        </header>
        <section class="wrapper style5">
            <div class="inner">
                <div id="map"></div>
                <div class="map-container">
                    <button class="button primary" onclick="getLocation()">Find My Location</button>
                </div>
            </div>
        </section>
    </article>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    // 1. Initialize Map
    // Coordinates centered slightly inland from Conchi
    var map = L.map('map').setView([12.5247, -69.9135], 15);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 2. Fix the "Floating" Marker with a proper Anchor
    var customIcon = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41], // This keeps the tip of the pin on the land
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    // 3. Load GPX
    var gpx = 'Conchi_Natuurbad_Wandelroute.gpx';
    new L.GPX(gpx, {
        async: true,
        polyline_options: {
            color: '#ff8c00', // Brighter orange
            weight: 6,
            opacity: 0.8
        }
    }).on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
    }).addTo(map);

    // 4. FIXED GPS: This draws the blue dot
    var userLocationMarker;
    var userLocationCircle;

    function getLocation() {
        map.locate({setView: true, maxZoom: 16});
    }

    map.on('locationfound', function(e) {
        // Remove old markers if they exist
        if (userLocationMarker) { map.removeLayer(userLocationMarker); }
        if (userLocationCircle) { map.removeLayer(userLocationCircle); }

        // Create the blue dot (User Location)
        userLocationCircle = L.circle(e.latlng, { radius: 15, color: '#1e90ff', fillOpacity: 0.5 }).addTo(map);
        userLocationMarker = L.circleMarker(e.latlng, { radius: 6, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 2 }).addTo(map);
        
        userLocationMarker.bindPopup("You are here!").openPopup();
    });

    map.on('locationerror', function() {
        alert("Could not find your location. Please check your GPS settings.");
    });

    // 5. The Conchi Pin
    var conchiMarker = L.marker([12.5247, -69.9135], {icon: customIcon}).addTo(map);
    conchiMarker.bindPopup(`
        <div style="text-align:center; width:150px; color: black;">
            <h3 style="margin:0;">Natural Pool</h3>
            <p style="font-size:12px;">Perfect for swim videos!</p>
            <img src="images/NB.jpeg" style="width:100%; border-radius:5px; margin-top:5px;">
        </div>
    `);
    setTimeout(function(){ map.invalidateSize()}, 500);
</script>
</body> </html>
