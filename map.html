<!DOCTYPE HTML>
<html>
<head>
    <title>Hike Map - HIXZ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { 
            height: 70vh; 
            width: 100%; 
            border-bottom: 2px solid #fff;
            background: #2e3436;
        }
        .map-container { padding: 2em; text-align: center; }

        /* THE FIX: Clears any theme styling that breaks map layers */
        .leaflet-pane img, 
        .leaflet-tile-container img {
            max-width: none !important;
            max-height: none !important;
            width: auto !important;
            padding: 0 !important;
        }

        .leaflet-popup-content-wrapper { color: #000 !important; border-radius: 8px; }
        .leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
        
        /* Ensures the photo inside the popup looks good */
        .popup-img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body class="is-preload">

    <header id="header">
        <h1><a href="index.html">HIXZ</a></h1>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <article id="main">
        <header>
            <h2>Aruba Hike Map</h2>
            <p>Live GPS Tracking & Trail Routes</p>
        </header>
        <section class="wrapper style5">
            <div class="inner">
                <div id="map"></div>
                <div class="map-container">
                    <button class="button primary" onclick="getLocation()">Find My Location</button>
                </div>
            </div>
        </section>
    </article>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    // 1. Layers
    var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' });
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' });
    var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: 'Map data: &copy; OpenStreetMap' });

    // 2. Initialize
    var map = L.map('map', {
        center: [12.5247, -69.9135],
        zoom: 15,
        layers: [satellite]
    });

    L.control.layers({"Satellite": satellite, "Terrain": terrain, "Streets": streets}).addTo(map);

    // 3. Load GPX Trail
    var gpxFile = 'Conchi_Natuurbad_Wandelroute.gpx';
    new L.GPX(gpxFile, {
        async: true,
        polyline_options: { color: '#00ccff', weight: 6, opacity: 0.9 }
    }).on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
    }).addTo(map);

    // 4. THE BLUE MARKER FIX: Using a CircleMarker instead of a Pin image
    // This will NEVER float in the ocean because it's a vector, not an image.
    var conchiDestination = L.circleMarker([12.5247, -69.9135], {
        radius: 10,
        fillColor: "#ff4500", // Bright Orange-Red
        color: "#fff",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
    }).addTo(map);

    conchiDestination.bindPopup(`
        <div style="text-align:center; width:160px; color:black;">
            <h3 style="margin:0;">Natural Pool</h3>
            <p style="font-size:12px; margin: 5px 0;">The end of the trail! Perfect for swim videos.</p>
            <img src="images/NB.jpeg" class="popup-img" alt="Natural Pool View">
        </div>
    `);

    // 5. GPS Logic
    var userMarker, userCircle;
    function getLocation() { map.locate({setView: true, maxZoom: 16}); }

    map.on('locationfound', function(e) {
        if (userMarker) { map.removeLayer(userMarker); }
        if (userCircle) { map.removeLayer(userCircle); }
        userCircle = L.circle(e.latlng, { radius: 20, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
        userMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
        userMarker.bindPopup("You are here!").openPopup();
    });

    setTimeout(function(){ map.invalidateSize()}, 500);
</script>
</body>
</html>
