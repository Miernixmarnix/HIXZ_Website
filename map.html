<!DOCTYPE HTML>
<html>
<head>
    <title>Hike Map - HIXZ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { 
            height: 70vh; 
            width: 100%; 
            border-bottom: 2px solid #fff;
            background: #2e3436;
        }
        .map-container { padding: 2em; text-align: center; }

        /* --- THE ULTIMATE MARKER FIX --- */
        /* This prevents the theme from stretching or moving map images */
        .leaflet-pane img, 
        .leaflet-marker-icon, 
        .leaflet-marker-shadow, 
        .leaflet-tile-container img {
            max-width: none !important;
            max-height: none !important;
            width: auto !important;
            height: auto !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            background: none !important;
            box-shadow: none !important;
        }

        .leaflet-popup-content-wrapper { color: #000 !important; }
        .leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
    </style>
</head>
<body class="is-preload">

    <header id="header">
        <h1><a href="index.html">HIXZ</a></h1>
        <nav id="nav">
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <article id="main">
        <header>
            <h2>Aruba Hike Map</h2>
            <p>Live GPS Tracking & Trail Routes</p>
        </header>
        <section class="wrapper style5">
            <div class="inner">
                <div id="map"></div>
                <div class="map-container">
                    <button class="button primary" onclick="getLocation()">Find My Location</button>
                </div>
            </div>
        </section>
    </article>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    // 1. Map Layer Definitions
    var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    });

    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    });

    var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data: &copy; OpenStreetMap, SRTM | Style: &copy; OpenTopoMap'
    });

    // 2. Initialize (Satellite as default)
    var map = L.map('map', {
        center: [12.5247, -69.9135],
        zoom: 15,
        layers: [satellite]
    });

    var baseMaps = {
        "Satellite": satellite,
        "Terrain": terrain,
        "Streets": streets
    };
    L.control.layers(baseMaps).addTo(map);

    // 3. Icon with proper Anchor (tip of the pin is at 12, 41)
    var customIcon = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41], 
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    // 4. Load GPX Trail
    var gpxFile = 'Conchi_Natuurbad_Wandelroute.gpx';
    new L.GPX(gpxFile, {
        async: true,
        polyline_options: {
            color: '#00ccff', 
            weight: 6,
            opacity: 0.9
        }
    }).on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
    }).addTo(map);

    // 5. GPS Locator Logic
    var userLocationMarker, userLocationCircle;
    function getLocation() { map.locate({setView: true, maxZoom: 16}); }

    map.on('locationfound', function(e) {
        if (userLocationMarker) { map.removeLayer(userLocationMarker); }
        if (userLocationCircle) { map.removeLayer(userLocationCircle); }
        userLocationCircle = L.circle(e.latlng, { radius: 20, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
        userLocationMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
        userLocationMarker.bindPopup("You are here!").openPopup();
    });

    // 6. Natural Pool Marker
    var conchiMarker = L.marker([12.5247, -69.9135], {icon: customIcon}).addTo(map);
    conchiMarker.bindPopup(`
        <div style="text-align:center; width:150px; color:black;">
            <h3 style="margin:0;">Natural Pool</h3>
            <p style="font-size:12px;">Perfect for swim videos!</p>
            <img src="images/NB.jpeg" style="width:100%; border-radius:5px; margin-top:5px;">
        </div>
    `);

    setTimeout(function(){ map.invalidateSize()}, 500);
</script>
</body>
</html>
