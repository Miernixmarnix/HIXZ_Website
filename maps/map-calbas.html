<!DOCTYPE HTML>
<html>
	<head>
		<title>Trail Map - HIXZ</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="../assets/css/main.css" />
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
		
		<style>
			body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050a06; }
			
			/* Full screen map locked behind the interface */
			#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #2a2a2a; }
			
			/* Prevent template CSS from breaking map tiles */
			.leaflet-pane img, .leaflet-tile-container img { max-width: none !important; width: auto !important; }
			
			/* Floating transparent header */
			#header { position: absolute; top: 0; width: 100%; z-index: 1000; background: rgba(5, 10, 6, 0.8); }
			
			/* Floating button locked to the bottom */
			.button-container {
				position: absolute; bottom: 40px; left: 0; width: 100%;
				display: flex; justify-content: center; z-index: 1000; pointer-events: none;
			}
			
			.google-btn {
				pointer-events: auto;
				display: inline-flex; align-items: center; justify-content: center;
				background-color: #1b3022; color: #ffffff !important; padding: 14px 36px;
				border-radius: 50px; text-decoration: none; font-family: 'Archivo Black', sans-serif;
				font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
				transition: all 0.3s ease; border: 1px solid #ffffff; cursor: pointer;
				box-shadow: 0 4px 15px rgba(0,0,0,0.5);
			}
			.google-btn:hover { background-color: #ffffff; color: #050a06 !important; }

			/* Full screen loading screen */
			#locating-overlay {
				position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background: rgba(5, 10, 6, 0.9); color: #ffffff;
				display: flex; align-items: center; justify-content: center;
				z-index: 9999; font-family: 'Archivo Black', sans-serif;
				font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase;
				opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
			}
			#locating-overlay.active { opacity: 1; pointer-events: all; }
			
			/* Push Leaflet controls below the floating header */
			.leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
			
			/* --- GLOBAL FIX: Restores the Leaflet layer menu so it isn't a blank white box --- */
			.leaflet-control-layers-expanded {
				background: #ffffff !important;
				padding: 12px !important;
				border-radius: 8px !important;
			}
			.leaflet-control-layers label {
				display: flex !important;
				align-items: center !important;
				color: #000000 !important;
				font-family: sans-serif !important;
				font-size: 14px !important;
				margin: 5px 0 !important;
			}
			.leaflet-control-layers input[type="radio"] {
				appearance: auto !important; 
				-webkit-appearance: radio !important;
				opacity: 1 !important;
				position: relative !important;
				margin-right: 8px !important;
			}
		</style>
	</head>
	<body class="is-preload">

		<header id="header" class="alt">
			<h1><a href="../index.html">HIXZ</a></h1>
			<nav id="nav">
				<ul>
					<li class="special">
						<a href="#menu" class="menuToggle"><span>Menu</span></a>
						<div id="menu">
							<ul>
								<li><a href="../index.html">Home</a></li>
								<li><a href="../generic.html">About Me</a></li>
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</header>

		<div id="locating-overlay">Locating...</div>
		<div id="map"></div>

		<div class="button-container">
			<button class="google-btn" onclick="getLocation()">Find My Location</button>
		</div>

		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
		
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

		<script>
			// --- GLOBAL FIX: Tile Layers (Removed 'keepBuffer' to restore speedy, lightweight performance) ---
			var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });
			var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });
			var terrain = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });

			// 2. Initialize map with standard, lightweight zoom settings
			var map = L.map('map', { center: [12.5092, -69.9702], zoom: 12, layers: [satellite] });
			
			// 3. Add the layer control menu, forcing it to remain fully open
			var baseMaps = {
				"Satellite": satellite,
				"Streets": streets,
				"Terrain": terrain
			};
			L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

			// =========================================================================
			// 4. THE GPX FILE LIST 
			// Delete the two slashes (//) in front of the ONE trail you want to load!
			// =========================================================================
			
			
			// var gpxFile = '../GPX/Balashi_Goudmijn__Spaans_Lagoen.gpx';
			 var gpxFile = '../GPX/Bushiribana_Rondwandeling_vanaf_Calbas.gpx';
			// var gpxFile = '../GPX/Jamanota_Trail.gpx';
			// var gpxFile = '../GPX/Sasarawichi_Trail.gpx';
			// var gpxFile = '../GPX/Boroncana__Alto_Vista_Kapel.gpx';
			// var gpxFile = '../GPX/Conchi_Natuurbad_Wandelroute.gpx';
			// var gpxFile = '../GPX/Arikok_Dos_Playa_Zuidelijke_Wandelroute.gpx';
			// var gpxFile = '../GPX/Bushiribana__Malmok_Beach.gpx';

			// =========================================================================

			// --- SPECIFIC FIX: Define Advanced, Shadow-Free Icons ---
			// By defining icons explicitly, we bypass Leaflet's attempt to load default shadows that create broken image boxes.
			var hikerIcon = L.icon({
				iconUrl: '../images/hiker.gif',
				shadowUrl: null, // Explicitly kill shadow to prevent broken box
				iconSize: [50, 50],
				iconAnchor: [25, 50],
				popupAnchor: [0, -50]
			});

			var flagIcon = L.icon({
				iconUrl: '../images/route.gif',
				shadowUrl: null, // Explicitly kill shadow to prevent broken box
				iconSize: [50, 50],
				iconAnchor: [25, 50],
				popupAnchor: [0, -50]
			});

			// --- NEW: Add references for your 2 extra waypoint flag GIFs ---
			// Remember to upload these files ('flag_0.gif' and 'flag_1.gif') to your images folder!
			var waypointIcon0 = L.icon({ iconUrl: '../images/flag_0.gif', shadowUrl: null, iconSize: [40, 40], iconAnchor: [20, 40] });
			var waypointIcon1 = L.icon({ iconUrl: '../images/flag_1.gif', shadowUrl: null, iconSize: [40, 40], iconAnchor: [20, 40] });

			// --- ADVANCED MARKER SYSTEM: Maps GPX points to custom defined GIFs ---
			// Step 1: Initialize GPX loader with standard markers and shadows disabled to clear broken boxes
			var trail = new L.GPX(gpxFile, {
				async: true,
				// Setting standard marker URLs to null ensures Leaflet doesn't attempt to load anything automatically, clearing broken images.
				marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, waypointIconUrl: null },
				polyline_options: { color: '#00ccff', weight: 6, opacity: 0.9 }
			});

			// Step 2: Use the 'loaded' event to plot the specific GIFs for start, end, and waypoints
			trail.on('loaded', function(e) {
				var points = e.target.getPoints(); // Standard track coordinates

				// Plot the Hiker at the START
				L.marker(points[0], { icon: hikerIcon }).addTo(map).bindPopup("Start of Trail");

				// --- LOOP TRAIL HANDLING: If start and end points are identical, do not plot the end flag to prevent overlap chaos ---
				if (points[0].lat !== points[points.length - 1].lat && points[0].lng !== points[points.length - 1].lng) {
					// Plot the Flag at the END for point-to-point hikes
					L.marker(points[points.length - 1], { icon: flagIcon }).addTo(map).bindPopup("End of Trail");
				}

				// --- WAYPOINT TRAIL HANDLING: Plot the extra GIFs for specific scenic markers on complex hikes ---
				// Leaflet-GPX provides a separate way to access user-defined waypoints (wpt), not just track points.
				// We access waypoints as a standard Leaflet layer feature group.
				var waypointLayer = e.target.getLayer('wpt');
				if (waypointLayer) {
					var waypoints = waypointLayer.getLayers(); // Standard Leaflet layers for all waypoints found in GPX
					
					// Assuming there are 2 specific waypoints defined in the GPX at the 'empty image spots' from your screenshot.
					// We can iterate through them and apply our specific flag GIFs based on their order.
					waypoints.forEach(function(wpt, index) {
						// Apply Waypoint Flag 0 to the first waypoint found
						if (index === 0) {
							wpt.setIcon(waypointIcon0);
						} 
						// Apply Waypoint Flag 1 to the second waypoint found
						else if (index === 1) {
							wpt.setIcon(waypointIcon1);
						} 
						// Optional: If there are 10 waypoints in the GPX and you don't define icons,
						// they will use Leaflet defaults, so ensure your GPX has clean data.
					});
				}

				// Center the map on the loaded route data
				map.fitBounds(e.target.getBounds());

			}).addTo(map);

			// Step 3: Global Location and Marker Management
			var userMarker, userCircle;
			
			// Geolocation logic
			function getLocation() { 
				document.getElementById('locating-overlay').classList.add('active');
				map.locate({setView: true, maxZoom: 17, maximumAge: 10000}); 
			}
			
			map.on('locationfound', function(e) {
				document.getElementById('locating-overlay').classList.remove('active');
				
				if (userMarker) { map.removeLayer(userMarker); }
				if (userCircle) { map.removeLayer(userCircle); }
				userCircle = L.circle(e.latlng, { radius: 15, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
				userMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
				userMarker.bindPopup("You are here!").openPopup();
			});

			map.on('locationerror', function(e) {
				document.getElementById('locating-overlay').classList.remove('active');
				alert("Could not find your location. Please check your device permissions.");
			});
		</script>
	</body>
</html>
