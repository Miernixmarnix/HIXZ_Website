<!DOCTYPE HTML>
<html>
	<head>
		<title>Calbas Trail Map - HIXZ</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="../assets/css/main.css" />
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
		
		<style>
			body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050a06; }
			
			#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #2a2a2a; }
			
			.leaflet-pane img, .leaflet-tile-container img { max-width: none !important; width: auto !important; }
			
			#header { position: absolute; top: 0; width: 100%; z-index: 1000; background: rgba(5, 10, 6, 0.8); }
			
			.button-container {
				position: absolute; bottom: 40px; left: 0; width: 100%;
				display: flex; justify-content: center; z-index: 1000; pointer-events: none;
			}
			
			.google-btn {
				pointer-events: auto;
				display: inline-flex; align-items: center; justify-content: center;
				background-color: #1b3022; color: #ffffff !important; padding: 14px 36px;
				border-radius: 50px; text-decoration: none; font-family: 'Archivo Black', sans-serif;
				font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
				transition: all 0.3s ease; border: 1px solid #ffffff; cursor: pointer;
				box-shadow: 0 4px 15px rgba(0,0,0,0.5);
			}
			.google-btn:hover { background-color: #ffffff; color: #050a06 !important; }

			#locating-overlay {
				position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background: rgba(5, 10, 6, 0.9); color: #ffffff;
				display: flex; align-items: center; justify-content: center;
				z-index: 9999; font-family: 'Archivo Black', sans-serif;
				font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase;
				opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
			}
			#locating-overlay.active { opacity: 1; pointer-events: all; }
			
			.leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
			
			.leaflet-control-layers-expanded {
				background: #ffffff !important;
				padding: 12px !important;
				border-radius: 8px !important;
			}
			.leaflet-control-layers label {
				display: flex !important;
				align-items: center !important;
				color: #000000 !important;
				font-family: sans-serif !important;
				font-size: 14px !important;
				margin: 5px 0 !important;
			}
			.leaflet-control-layers input[type="radio"] {
				appearance: auto !important; 
				-webkit-appearance: radio !important;
				opacity: 1 !important;
				position: relative !important;
				margin-right: 8px !important;
			}

			.leaflet-popup-content {
				font-family: 'Archivo Black', sans-serif !important;
				color: #050a06 !important;
				text-transform: uppercase;
				text-align: center;
				letter-spacing: 1px;
			}
		</style>
	</head>
	<body class="is-preload">

		<header id="header" class="alt">
			<h1><a href="../index.html">HIXZ</a></h1>
			<nav id="nav">
				<ul>
					<li class="special">
						<a href="#menu" class="menuToggle"><span>Menu</span></a>
						<div id="menu">
							<ul>
								<li><a href="../index.html">Home</a></li>
								<li><a href="../generic.html">About Me</a></li>
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</header>

		<div id="locating-overlay">Locating...</div>
		<div id="map"></div>

		<div class="button-container">
			<button class="google-btn" onclick="getLocation()">Find My Location</button>
		</div>

		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
		
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

		<script>
			// 1. Lightweight map layers without keepBuffer
			var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });
			var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });
			var terrain = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri' });

			var map = L.map('map', { center: [12.5092, -69.9702], zoom: 12, layers: [satellite] });
			
			var baseMaps = {
				"Satellite": satellite,
				"Streets": streets,
				"Terrain": terrain
			};
			L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

			// 2. The specific GPX file for this map
			var gpxFile = '../GPX/Bushiribana_Rondwandeling_vanaf_Calbas.gpx';

			// 3. Define the custom icons with shadows explicitly removed
			var hikerIcon = L.icon({
				iconUrl: '../images/hiker.gif',
				shadowUrl: null, 
				iconSize: [50, 50],
				iconAnchor: [25, 50],
				popupAnchor: [0, -50]
			});

			var waypointIcon0 = L.icon({ iconUrl: '../images/flag_0.gif', shadowUrl: null, iconSize: [40, 40], iconAnchor: [20, 40] });
			var waypointIcon1 = L.icon({ iconUrl: '../images/flag_1.gif', shadowUrl: null, iconSize: [40, 40], iconAnchor: [20, 40] });

			// 4. Load the GPX track
			var trail = new L.GPX(gpxFile, {
				async: true,
				marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, waypointIconUrl: null },
				polyline_options: { color: '#00ccff', weight: 6, opacity: 0.9 }
			});

			trail.on('loaded', function(e) {
				var points = e.target.getPoints();

				// Plot the Hiker at the Start (which is also the end for this loop)
				L.marker(points[0], { icon: hikerIcon }).addTo(map).bindPopup("Start & End of Trail");

				// Handle the extra scenic waypoints
				var waypointLayer = e.target.getLayer('wpt');
				if (waypointLayer) {
					var waypoints = waypointLayer.getLayers();
					waypoints.forEach(function(wpt, index) {
						if (index === 0) {
							wpt.setIcon(waypointIcon0);
						} else if (index === 1) {
							wpt.setIcon(waypointIcon1);
						}
					});
				}

				map.fitBounds(e.target.getBounds());
			}).addTo(map);

			// 5. Geolocation functionality
			var userMarker, userCircle;
			
			function getLocation() { 
				document.getElementById('locating-overlay').classList.add('active');
				map.locate({setView: true, maxZoom: 17, maximumAge: 10000}); 
			}
			
			map.on('locationfound', function(e) {
				document.getElementById('locating-overlay').classList.remove('active');
				
				if (userMarker) { map.removeLayer(userMarker); }
				if (userCircle) { map.removeLayer(userCircle); }
				userCircle = L.circle(e.latlng, { radius: 15, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
				userMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
				userMarker.bindPopup("You are here!").openPopup();
			});

			map.on('locationerror', function(e) {
				document.getElementById('locating-overlay').classList.remove('active');
				alert("Could not find your location. Please check your device permissions.");
			});
		</script>
	</body>
</html>
