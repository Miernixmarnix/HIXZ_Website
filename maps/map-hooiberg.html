<!DOCTYPE HTML>
<html>
	<head>
		<title>Trail Map - HIXZ</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="../assets/css/main.css" />
		<noscript><link rel="stylesheet" href="../assets/css/noscript.css" /></noscript>

		<style>
			body, html {
				margin: 0; padding: 0; height: 100%;
				background-color: #050a06; /* Keep the dark theme seamless */
			}
			#map-container {
				width: 100%; height: 80vh; /* Map takes up 80% of screen */
				position: relative;
			}
			.button-container {
				display: flex; justify-content: center; align-items: center;
				height: 20vh; /* Button takes up bottom 20% */
				background-color: #050a06;
			}
			/* Your signature dark green button */
			.google-btn {
				display: inline-flex; align-items: center; justify-content: center;
				background-color: #1b3022; color: #ffffff !important; padding: 14px 36px;
				border-radius: 50px; text-decoration: none; font-family: 'Archivo Black', sans-serif;
				font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
				transition: all 0.3s ease; border: 1px solid #ffffff; cursor: pointer;
			}
			.google-btn:hover { background-color: #ffffff; color: #050a06 !important; }
		</style>
	</head>
	<body class="is-preload">

		<header id="header" class="alt" style="position: absolute; top: 0; width: 100%; z-index: 9999; background: rgba(5, 10, 6, 0.8);">
			<h1><a href="../index.html">HIXZ</a></h1>
			<nav id="nav">
				<ul>
					<li class="special">
						<a href="#menu" class="menuToggle"><span>Menu</span></a>
						<div id="menu">
							<ul>
								<li><a href="../index.html">Home</a></li>
								<li><a href="../generic.html">About Me</a></li>
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</header>

		<div id="map-container">
			<div style="width: 100%; height: 100%; background-color: #2a2a2a; display: flex; align-items: center; justify-content: center; color: white;">
				[Map loads here]
			</div>
		</div>

		<div class="button-container">
			<button class="google-btn" onclick="findLocation()">Find My Location</button>
		</div>

		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>

		<script>
			function findLocation() {
				const btn = document.querySelector('.google-btn');
				btn.innerHTML = "Locating...";
				// Your geolocation logic goes here
				setTimeout(() => { btn.innerHTML = "Location Found!"; }, 2000);
			}
		</script>
	</body>
