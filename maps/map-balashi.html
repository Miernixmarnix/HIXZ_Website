<!DOCTYPE HTML>
<html>
	<head>
		<title>Balashi Map - HIXZ</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="../assets/css/main.css" />
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
		
		<style>
			body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050a06; }
			#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #2a2a2a; }
			.leaflet-pane img, .leaflet-tile-container img { max-width: none !important; width: auto !important; }
			#header { position: absolute; top: 0; width: 100%; z-index: 1000; background: rgba(5, 10, 6, 0.8); height: 3.25em; line-height: 3.25em; }
			#header h1 { position: absolute; left: 50%; transform: translateX(-50%); margin: 0; }
			.back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; background-color: #1b3022; color: #ffffff !important; padding: 8px 18px; border-radius: 50px; text-decoration: none; font-family: 'Archivo Black', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s ease; border: 1px solid #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); line-height: normal; }
			.back-btn:hover { background-color: #ffffff; color: #050a06 !important; }
			.button-container { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
			.google-btn { pointer-events: auto; display: inline-flex; align-items: center; justify-content: center; background-color: #1b3022; color: #ffffff !important; padding: 14px 36px; border-radius: 50px; text-decoration: none; font-family: 'Archivo Black', sans-serif; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s ease; border: 1px solid #ffffff; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
			.google-btn:hover { background-color: #ffffff; color: #050a06 !important; }
			#locating-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 6, 0.9); color: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
			#locating-overlay.active { opacity: 1; pointer-events: all; }
			.leaflet-control-zoom, .leaflet-control-layers { margin-top: 80px !important; }
			.leaflet-control-layers-expanded { background: #ffffff !important; padding: 12px !important; border-radius: 8px !important; }
			.leaflet-control-layers label { display: flex !important; align-items: center !important; color: #000000 !important; font-family: sans-serif !important; font-size: 14px !important; margin: 5px 0 !important; }
			.leaflet-control-layers input[type="radio"] { appearance: auto !important; -webkit-appearance: radio !important; opacity: 1 !important; position: relative !important; margin-right: 8px !important; }
		</style>
	</head>
	<body class="is-preload">
		<header id="header" class="alt">
			<a href="#" onclick="exitSecurely(); return false;" class="back-btn">&#8592; Exit</a>
			<h1><a href="../index.html">HIXZ</a></h1>
			<nav id="nav">
				<ul>
					<li class="special">
						<a href="#menu" class="menuToggle"><span>Menu</span></a>
						<div id="menu">
							<ul>
								<li><a href="#" onclick="exitSecurely(); return false;">Home</a></li>
								<li><a href="../generic.html">About Me</a></li>
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</header>
		<div id="locating-overlay">Locating...</div>
		<div id="map"></div>
		<div class="button-container">
			<button class="google-btn" onclick="getLocation()">Find My Location</button>
		</div>

		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>
		<script src="../assets/js/breakpoints.min.js"></script>
		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

		<script>
			function exitSecurely() {
				if (localStorage.getItem('hixz_vip') === 'true') { window.location.href = '../unlocked.html'; } 
				else { window.location.href = '../index.html'; }
			}
			var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri', keepBuffer: 8 });
			var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', keepBuffer: 8 });
			var terrain = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri', keepBuffer: 8 });
			var map = L.map('map', { center: [12.5092, -69.9702], zoom: 12, layers: [satellite] });
			var baseMaps = { "Satellite": satellite, "Streets": streets, "Terrain": terrain };
			L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

			// BALASHI GPX
			var gpxFile = '../GPX/Balashi_Goudmijn__Spaans_Lagoen.gpx';

			new L.GPX(gpxFile, {
				async: true,
				marker_options: { startIconUrl: '../images/hiker.gif', endIconUrl: '', shadowUrl: '', waypointIconUrl: '', iconSize: [50, 50], iconAnchor: [25, 50] },
				polyline_options: { color: '#00ccff', weight: 6, opacity: 0.9 }
			}).on('loaded', function(e) { map.fitBounds(e.target.getBounds()); }).addTo(map);

			var userMarker, userCircle;
			function getLocation() { document.getElementById('locating-overlay').classList.add('active'); map.locate({setView: true, maxZoom: 17, maximumAge: 10000}); }
			map.on('locationfound', function(e) {
				document.getElementById('locating-overlay').classList.remove('active');
				if (userMarker) { map.removeLayer(userMarker); } if (userCircle) { map.removeLayer(userCircle); }
				userCircle = L.circle(e.latlng, { radius: 15, color: '#1e90ff', fillOpacity: 0.3 }).addTo(map);
				userMarker = L.circleMarker(e.latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(map);
				userMarker.bindPopup("You are here!").openPopup();
			});
			map.on('locationerror', function(e) { document.getElementById('locating-overlay').classList.remove('active'); alert("Could not find your location."); });
		</script>
	</body>
</html>
